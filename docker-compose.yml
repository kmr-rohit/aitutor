version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: sh -c "pip install -e .[dev] && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
